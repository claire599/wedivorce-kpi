function isWE(d){const day=new Date(d).getDay();return day===0||day===6;}

  function handleCSV(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var all=ev.target.result.split(/\r?\n/).filter(function(l){return l.trim();});var sep=all[0].includes("\t")?"\t":",";var heads=all[0].split(sep).map(function(h){return h.trim().toLowerCase();});var isScript=heads.includes("jour")&&heads.findIndex(function(h){return h.includes("impr");})>=0;if(isScript){var iD=heads.findIndex(function(h){return h==="jour";}),iC=heads.findIndex(function(h){return h==="campagne";}),iI=heads.findIndex(function(h){return h.includes("impr");}),iCl=heads.findIndex(function(h){return h.includes("clic");}),iCo=heads.findIndex(function(h){return h.includes("cout total")||h.includes("co\u00fbt total");}),iCv=heads.findIndex(function(h){return h.includes("conv. total")||h.includes("conv totale");}),iCtr=heads.findIndex(function(h){return h==="ctr";}),iCpc=heads.findIndex(function(h){return h.includes("cpc");}),iCcv=heads.findIndex(function(h){return h.includes("cout/conv")||h.includes("co\u00fbt/conv");});var rows=[];all.slice(1).forEach(function(l){var v=l.split(sep).map(function(x){return x.trim();});var camp=v[iC]?v[iC].trim():"";if(!CAMPS.includes(camp))return;rows.push({date:v[iD]?v[iD].trim():"",campaign:camp,impr:pNum(v[iI]),clics:pNum(v[iCl]),cout_total:pNum(v[iCo]),conv_total:pNum(v[iCv]),conv_devis:"",conv_compte:"",ctr:pNum(v[iCtr]),cpc:pNum(v[iCpc]),cout_conv:pNum(v[iCcv])});});if(!rows.length){setCsvErr("Aucune ligne reconnue.");return;}var u=entries.slice();rows.forEach(function(nr){var i=u.findIndex(function(e){return e.date===nr.date&&e.campaign===nr.campaign;});if(i>=0)u[i]=Object.assign({},u[i],nr);else u.push(nr);});upd(u);setCsvErr("");flash(rows.length+" lignes importees");}else{var hIdx=all.findIndex(function(l){var low=l.toLowerCase();return low.includes("campagne")&&(low.includes("clics")||low.includes("impr"));});if(hIdx<0){setCsvErr("En-tetes introuvables.");return;}var h2=pCSV(all[hIdx]).map(fu   function handleConv(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var lines=ev.target.result.split(/\r?\n/).filter(function(l){return l.trim();});var heads=lines[0].split(",").map(function(h){return h.trim().toLowerCase();});var iD=heads.indexOf("date"),iC=heads.indexOf("campagne"),iA=heads.indexOf("action de conversion"),iV=heads.indexOf("conversions");if([iD,iC,iA,iV].includes(-1)){setCsvErr("Colonnes manquantes.");return;}var ups={};lines.slice(1).forEach(function(l){var v=pCSV(l);var date=v[iD]?v[iD].trim():"",camp=v[iC]?v[iC].trim():"",action=v[iA]?v[iA].trim():"",conv=parseFloat(v[iV])||0;if(!date||!camp||!action)return;var k=date+"_"+camp;if(!ups[k])ups[k]={date:date,campaign:camp,conv_devis:0,conv_compte:0};if(action.includes("Devis Finalis"))ups[k].conv_devis+=conv;if(action.includes("Creation de Compte")||action.includes("Cr\u00e9ation de Compte"))ups[k].conv_compte+=conv;});var u=entries.slice();Object.values(ups).forEach(function(up){var i=u.findIndex(function(e){return e.date===up.date&&e.campaign===up.campaign;});if(i>=0)u[i]=Object.assign({},u[i],{conv_devis:up.conv_devis,conv_compte:up.conv_compte});else u.push({date:up.date,campaign:up.campaign,conv_devis:up.conv_devis,conv_compte:up.conv_compte});});upd(u);setCsvErr("");flash("Conversions importees");}catch(err){setCsvErr("Erreur: "+err.message);}};reader.readAsText(file,"utf-8");e.target.value="";}

              {view==="csv"&&(
                <div>
                  <div style={{fontSize:"10px",fontWeight:700,textTransform:"uppercase",color:"#8892b0",marginBottom:"14px"}}>Import fichiers</div>
                  <div style={{background:"#fff",borderRadius:"12px",border:"1px solid #e8ecf3",padding:"24px 28px",marginBottom:"16px"}}>
                    <p style={{fontSize:"13px",fontWeight:600,color:"#1a1a2e",marginBottom:"6px"}}>1 - Performances (script GAds)</p>
                    <p style={{fontSize:"12px",color:"#6b7aaa",marginBottom:"16px"}}>Fichier genere par le script GAds Performances.</p>
                    <label style={{display:"inline-block",background:"#1a1a2e",color:"#fff",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",fontWeight:600,cursor:"pointer"}}>Importer les performances<input type="file" accept=".csv" onChange={handleCSV} style={{display:"none"}}/></label>
                  </div>
                  <div style={{background:"#fff",borderRadius:"12px",border:"1px solid #e8ecf3",padding:"24px 28px"}}>
                    <p style={{fontSize:"13px",fontWeight:600,color:"#1a1a2e",marginBottom:"6px"}}>2 - Conversions (script GAds)</p>
                    <p style={{fontSize:"12px",color:"#6b7aaa",marginBottom:"16px"}}>Fichier genere par le script GAds Conversions.</p>
                    <label style={{display:"inline-block",background:"#0F6E56",color:"#fff",borderRadius:"8px",padding:"8px 20px",fontSize:"12px",fontWeight:600,cursor:"pointer"}}>Importer les conversions<input type="file" accept=".csv" onChange={handleConv} style={{display:"none"}}/></label>
                  </div>
                  {csvErr&&<p style={{color:"#e24b4a",fontSize:"12px",marginTop:"10px"}}>{csvErr}</p>}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
